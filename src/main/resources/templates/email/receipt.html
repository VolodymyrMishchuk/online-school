<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Payment Receipt</title>
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; margin: 40px; color: #333; }
        .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
        .receipt-details { margin-bottom: 30px; }
        .receipt-details p { margin: 5px 0; }
        .items-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .items-table th, .items-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .items-table th { background-color: #f5f5f5; }
        .total-row { font-weight: bold; }
        .footer { text-align: center; font-size: 12px; color: #777; margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Payment Receipt</h1>
</div>

<div class="receipt-details">
    <p><strong>Receipt ID:</strong> <span th:text="${payment.id}"></span></p>
    <p><strong>Date:</strong> <span th:text="${date}"></span></p>
    <p><strong>Billed To:</strong> <span th:text="${personName}"></span></p>
    <p><strong>Email:</strong> <span th:text="${payment.person.email}"></span></p>
</div>

<table class="items-table">
    <thead>
    <tr>
        <th>Description</th>
        <th>Payment Method</th>
        <th>Amount</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td th:text="${courseName}"></td>
        <td th:text="${payment.paymentSystem}"></td>
        <td><span th:text="${payment.amount}"></span> <span th:text="${payment.currency}"></span></td>
    </tr>
    <tr class="total-row">
        <td colspan="2" style="text-align: right;">Total</td>
        <td><span th:text="${payment.amount}"></span> <span th:text="${payment.currency}"></span></td>
    </tr>
    </tbody>
</table>

<div class="footer">
    <p>Thank you for your purchase!</p>
</div>

</body>
</html>
